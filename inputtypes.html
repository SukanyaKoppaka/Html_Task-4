<!DOCTYPE html>
<html>
<head>
    <title>Input Types</title>
</head>
<body>

    <h2>HTML Input Types</h2>

    <form>

        <label>Text:</label><br>
        <input type="text" placeholder="Enter text"><br><br>

        <label>Number:</label><br>
        <input type="number" placeholder="Enter number"><br><br>

        <label>Telephone:</label><br>
        <input type="tel" placeholder="Enter phone number"><br><br>

        <label>Range:</label><br>
        <input type="range"><br><br>

        <label>File:</label><br>
        <input type="file"><br><br>

        <label>Button:</label><br>
        <input type="button" value="Click Me"><br><br>

        <label>Search:</label><br>
        <input type="search" placeholder="Search here"><br><br>

        <label>Color:</label><br>
        <input type="color"><br><br>

        <label>Radio:</label><br>
        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female
        <br><br>

        <label>Checkbox:</label><br>
        <input type="checkbox"> HTML
        <input type="checkbox"> CSS
        <input type="checkbox"> JavaScript
        <br><br>

        <label>Image:</label><br>
        <input type="image"
        src="">
    
        <br><br>

        <label>Date:</label><br>
        <input type="date"><br><br>

        <label>Time:</label><br>
        <input type="time"><br><br>

        <label>Date and Time:</label><br>
        <input type="datetime-local"><br><br>

    </form>

</body>
</html>
